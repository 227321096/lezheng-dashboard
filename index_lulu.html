<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乐正 · 水豚噜噜版</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Lulu Base ── */
:root {
  --lulu-bg: #faf8f3;
  --lulu-card: #ffffff;
  --lulu-primary: #8B7355;
  --lulu-secondary: #c4a882;
  --lulu-accent: #f4a261;
  --lulu-water: #a8d5e5;
  --lulu-pink: #f2b5a3;
  --lulu-green: #a8c686;
  --lulu-text: #5c4a3a;
  --lulu-muted: #a09080;
  --lulu-border: rgba(139,115,85,0.12);
  --shadow: 0 2px 8px rgba(139,115,85,0.08), 0 8px 24px rgba(139,115,85,0.06);
  --shadow-hover: 0 4px 16px rgba(139,115,85,0.12), 0 12px 32px rgba(139,115,85,0.1);
}

body {
  background: var(--lulu-bg);
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  color: var(--lulu-text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── Lulu Floating Background ── */
.lulu-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

/* Water ripples */
.water {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  background: linear-gradient(to top, rgba(168,213,229,0.3), transparent);
}
.water::before, .water::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(168,213,229,0.2);
  animation: ripple 4s ease-in-out infinite;
}
.water::before { width: 200px; height: 60px; bottom: 20px; left: 10%; animation-delay: 0s; }
.water::after { width: 160px; height: 50px; bottom: 30px; right: 15%; animation-delay: 2s; }

@keyframes ripple {
  0%, 100% { transform: scaleX(1); opacity: 0.4; }
  50% { transform: scaleX(1.15); opacity: 0.8; }
}

/* Floating capybaras */
.capy {
  position: absolute;
  font-size: 2rem;
  animation: float 6s ease-in-out infinite;
  opacity: 0.15;
  user-select: none;
}
.capy:nth-child(1) { top: 12%; left: 5%; animation-duration: 7s; animation-delay: 0s; }
.capy:nth-child(2) { top: 20%; right: 8%; animation-duration: 8s; animation-delay: 1.5s; opacity: 0.1; font-size: 1.5rem; }
.capy:nth-child(3) { top: 55%; left: 3%; animation-duration: 6.5s; animation-delay: 3s; opacity: 0.12; }
.capy:nth-child(4) { top: 65%; right: 5%; animation-duration: 9s; animation-delay: 0.8s; opacity: 0.08; font-size: 1.2rem; }

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-12px) rotate(3deg); }
  75% { transform: translateY(6px) rotate(-2deg); }
}

/* Stars */
.star {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--lulu-accent);
  border-radius: 50%;
  animation: twinkle 2.5s ease-in-out infinite;
  opacity: 0;
}
.star::after { content: '✦'; position: absolute; font-size: 10px; color: var(--lulu-accent); top: -4px; left: -2px; }
.star:nth-child(5) { top: 15%; left: 20%; animation-delay: 0s; }
.star:nth-child(6) { top: 8%; right: 25%; animation-delay: 0.8s; }
.star:nth-child(7) { top: 35%; left: 8%; animation-delay: 1.5s; }
.star:nth-child(8) { top: 48%; right: 12%; animation-delay: 0.4s; }

@keyframes twinkle {
  0%, 100% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 0.8; transform: scale(1); }
}

/* Floating hearts */
.heart {
  position: absolute;
  font-size: 1rem;
  animation: rise 8s ease-in infinite;
  opacity: 0;
}
.heart:nth-child(9) { bottom: 80px; left: 15%; animation-delay: 0s; }
.heart:nth-child(10) { bottom: 100px; right: 20%; animation-delay: 3s; }
.heart:nth-child(11) { bottom: 60px; left: 40%; animation-delay: 5.5s; }

@keyframes rise {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  80% { opacity: 0.3; }
  100% { transform: translateY(-200px) rotate(30deg); opacity: 0; }
}

/* ── Apple Nav (Lulu-ized) ── */
.apple-nav {
  background: rgba(250,248,243,0.8);
  backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--lulu-border);
}
.apple-nav a { color: var(--lulu-primary); }
.apple-nav a:hover { background: rgba(139,115,85,0.08); }
.apple-nav a.active { color: var(--lulu-accent); }
.nav-lulu { display: inline-block; margin-left: 4px; font-size: 0.9rem; }

/* ── Hero ── */
.hero-lulu {
  text-align: center;
  padding: 60px 20px 40px;
  position: relative;
  z-index: 1;
}
.lulu-avatar {
  font-size: 5rem;
  animation: lulu-bounce 3s ease-in-out infinite;
  display: inline-block;
  margin-bottom: 16px;
}
@keyframes lulu-bounce {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-8px) rotate(3deg); }
}
.hero-lulu h1 {
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 800;
  color: var(--lulu-text);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.hero-lulu p { color: var(--lulu-muted); font-size: 0.95rem; }

/* ── Profile ── */
.profile-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
.profile-chip {
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--lulu-border);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 0.72rem;
  color: var(--lulu-muted);
  backdrop-filter: blur(8px);
}
.profile-chip span { color: var(--lulu-accent); font-weight: 600; }

/* ── Clock ── */
.clock-lulu {
  text-align: center;
  padding: 20px 20px 40px;
  position: relative;
  z-index: 1;
}
#clockTime { font-size: 3.5rem; font-weight: 800; color: var(--lulu-primary); letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums; }
#clockSec { font-size: 1.1rem; color: var(--lulu-secondary); font-weight: 400; }
#clockDate { font-size: 0.8rem; color: var(--lulu-muted); margin-top: 4px; }

/* ── Lulu Cards ── */
.lulu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding: 0 40px 60px;
  max-width: 960px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.lulu-card {
  background: var(--lulu-card);
  border: 1px solid var(--lulu-border);
  border-radius: 20px;
  padding: 28px;
  text-decoration: none;
  color: var(--lulu-text);
  display: block;
  box-shadow: var(--shadow);
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}
.lulu-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(244,162,97,0.15), transparent 70%);
  border-radius: 50%;
  transition: all 0.3s;
}
.lulu-card:hover {
  transform: translateY(-4px) scale(1.01);
  box-shadow: var(--shadow-hover);
}
.lulu-card:hover::before { transform: scale(1.5); }

.lulu-card .card-icon { font-size: 2.2rem; margin-bottom: 14px; display: block; }
.lulu-card .card-title { font-size: 1rem; font-weight: 700; color: var(--lulu-text); margin-bottom: 6px; }
.lulu-card .card-desc { font-size: 0.8rem; color: var(--lulu-muted); line-height: 1.6; margin-bottom: 14px; }

.lulu-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.lulu-tag {
  display: inline-flex;
  padding: 2px 10px;
  border-radius: 100px;
  font-size: 0.65rem;
  font-weight: 600;
}
.tag-lulu-blue { background: rgba(168,213,229,0.3); color: #5a9ab0; }
.tag-lulu-green { background: rgba(168,198,134,0.3); color: #6a9a4a; }
.tag-lulu-orange { background: rgba(244,162,97,0.2); color: #c47a3a; }
.tag-lulu-pink { background: rgba(242,181,163,0.3); color: #b07060; }
.tag-lulu-purple { background: rgba(180,140,200,0.2); color: #8060a0; }

/* ── Footer ── */
.lulu-footer {
  text-align: center;
  padding: 30px 20px;
  color: var(--lulu-muted);
  font-size: 0.72rem;
  border-top: 1px solid var(--lulu-border);
  position: relative;
  z-index: 1;
}
.lulu-footer span { display: inline-block; animation: lulu-wiggle 2s ease-in-out infinite; }
@keyframes lulu-wiggle {
  0%, 100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

/* ── Page header ── */
.page-header { padding: 50px 40px 30px; max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }
.page-header h1 { font-size: 1.8rem; font-weight: 800; color: var(--lulu-text); letter-spacing: -0.02em; margin-bottom: 6px; }
.page-header p { color: var(--lulu-muted); font-size: 0.85rem; }
.back-link { color: var(--lulu-accent); text-decoration: none; font-size: 0.82rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; transition: background 0.15s; margin-bottom: 20px; }
.back-link:hover { background: rgba(244,162,97,0.1); }
</style>
</head>
<body>

<!-- Background decorations -->
<div class="lulu-bg">
  <div class="capy">🐹</div>
  <div class="capy">🐹</div>
  <div class="capy">🐹</div>
  <div class="capy">🐹</div>
  <div class="star"></div>
  <div class="star"></div>
  <div class="star"></div>

  <div class="heart">💜</div>

</div>

<nav class="apple-nav">
  <a href="index.html">首页</a>

</div>

<!-- Cards -->
<div class="lulu-grid">

    <div class="card-title">公考板块</div>

<!-- Footer -->
<div class="lulu-footer">
  <span>🐹</span> OpenClaw · 个人 Dashboard · 由 AI 驱动 · 水豚噜噜加持
</div>

<script>
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = h + ':' + m;
  document.getElementById('clockSec').textContent = s;
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('clockDate').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + days[now.getDay()];
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
