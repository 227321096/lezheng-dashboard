<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐹 水豚噜噜 SVG 测试</title>
<style>
body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 40px; background: #faf8f3; font-family: sans-serif; }
.caption { font-size: 0.9rem; color: #8B7355; text-align: center; }
.row { display: flex; gap: 60px; align-items: center; }
</style>
</head>
<body>

<h2 style="color:#8B7355;">🐹 水豚噜噜 — 矢量版</h2>

<!-- 基本款噜噜 -->
<div class="row">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180">
  <!-- 身体 -->
  <ellipse cx="100" cy="125" rx="68" ry="55" fill="#C4956A"/>
  <!-- 肚子高光 -->
  <ellipse cx="100" cy="135" rx="50" ry="38" fill="#D4A87A"/>
  <!-- 头 -->
  <ellipse cx="100" cy="72" rx="56" ry="50" fill="#C4956A"/>
  <!-- 头顶耳朵左 -->
  <ellipse cx="62" cy="38" rx="16" ry="12" fill="#C4956A"/>
  <ellipse cx="62" cy="38" rx="10" ry="7" fill="#E8C4A0"/>
  <!-- 头顶耳朵右 -->
  <ellipse cx="138" cy="38" rx="16" ry="12" fill="#C4956A"/>
  <ellipse cx="138" cy="38" rx="10" ry="7" fill="#E8C4A0"/>
  <!-- 脸部浅色 -->
  <ellipse cx="100" cy="82" rx="40" ry="34" fill="#D4A87A"/>
  <!-- 眯眯眼左 -->
  <path d="M72,72 Q80,66 88,72 Q80,78 72,72Z" fill="#5C3D2E"/>
  <!-- 眯眯眼右 -->
  <path d="M112,72 Q120,66 128,72 Q120,78 112,72Z" fill="#5C3D2E"/>
  <!-- 眼睛高光 -->
  <circle cx="78" cy="70" r="3" fill="white" opacity="0.7"/>
  <circle cx="118" cy="70" r="3" fill="white" opacity="0.7"/>
  <!-- 鼻子 -->
  <ellipse cx="100" cy="85" rx="10" ry="7" fill="#8B5E3C"/>
  <!-- 鼻孔 -->
  <ellipse cx="96" cy="86" rx="2.5" ry="2" fill="#5C3D2E"/>
  <ellipse cx="104" cy="86" rx="2.5" ry="2" fill="#5C3D2E"/>
  <!-- 嘴巴 -->
  <path d="M92,92 Q100,98 108,92" stroke="#8B5E3C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="62" cy="80" rx="13" ry="8" fill="#F4A0A0" opacity="0.35"/>
  <ellipse cx="138" cy="80" rx="13" ry="8" fill="#F4A0A0" opacity="0.35"/>
  <!-- 前肢 -->
  <ellipse cx="72" cy="162" rx="18" ry="12" fill="#B8896A"/>
  <ellipse cx="128" cy="162" rx="18" ry="12" fill="#B8896A"/>
  <!-- 后肢 -->
  <ellipse cx="62" cy="172" rx="20" ry="13" fill="#B8896A"/>
  <ellipse cx="138" cy="172" rx="20" ry="13" fill="#B8896A"/>
  <!-- 尾巴 -->
  <ellipse cx="170" cy="140" rx="10" ry="8" fill="#B8896A"/>
</svg>

<!-- 开心款噜噜 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180">
  <ellipse cx="100" cy="125" rx="68" ry="55" fill="#C4956A"/>
  <ellipse cx="100" cy="135" rx="50" ry="38" fill="#D4A87A"/>
  <ellipse cx="100" cy="72" rx="56" ry="50" fill="#C4956A"/>
  <ellipse cx="62" cy="38" rx="16" ry="12" fill="#C4956A"/>
  <ellipse cx="62" cy="38" rx="10" ry="7" fill="#E8C4A0"/>
  <ellipse cx="138" cy="38" rx="16" ry="12" fill="#C4956A"/>
  <ellipse cx="138" cy="38" rx="10" ry="7" fill="#E8C4A0"/>
  <ellipse cx="100" cy="82" rx="40" ry="34" fill="#D4A87A"/>
  <!-- 开心眯眼（弧形笑眼） -->
  <path d="M70,72 Q80,64 90,72" stroke="#5C3D2E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M110,72 Q120,64 130,72" stroke="#5C3D2E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="85" rx="10" ry="7" fill="#8B5E3C"/>
  <ellipse cx="96" cy="86" rx="2.5" ry="2" fill="#5C3D2E"/>
  <ellipse cx="104" cy="86" rx="2.5" ry="2" fill="#5C3D2E"/>
  <!-- 大笑容 -->
  <path d="M85,92 Q100,105 115,92" stroke="#8B5E3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="62" cy="80" rx="13" ry="8" fill="#F4A0A0" opacity="0.4"/>
  <ellipse cx="138" cy="80" rx="13" ry="8" fill="#F4A0A0" opacity="0.4"/>
  <ellipse cx="72" cy="162" rx="18" ry="12" fill="#B8896A"/>
  <ellipse cx="128" cy="162" rx="18" ry="12" fill="#B8896A"/>
  <ellipse cx="62" cy="172" rx="20" ry="13" fill="#B8896A"/>
  <ellipse cx="138" cy="172" rx="20" ry="13" fill="#B8896A"/>
  <ellipse cx="170" cy="140" rx="10" ry="8" fill="#B8896A"/>
</svg>

<!-- 游泳款噜噜 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180">
  <!-- 水 -->
  <ellipse cx="100" cy="165" rx="90" ry="25" fill="#A8D5E5" opacity="0.6"/>
  <!-- 身体（漂水面） -->
  <ellipse cx="100" cy="145" rx="70" ry="45" fill="#C4956A"/>
  <ellipse cx="100" cy="152" rx="52" ry="32" fill="#D4A87A"/>
  <!-- 头 -->
  <ellipse cx="100" cy="100" rx="52" ry="46" fill="#C4956A"/>
  <!-- 耳朵 -->
  <ellipse cx="60" cy="66" rx="14" ry="10" fill="#C4956A"/>
  <ellipse cx="60" cy="66" rx="8" ry="6" fill="#E8C4A0"/>
  <ellipse cx="140" cy="66" rx="14" ry="10" fill="#C4956A"/>
  <ellipse cx="140" cy="66" rx="8" ry="6" fill="#E8C4A0"/>
  <ellipse cx="100" cy="108" rx="36" ry="30" fill="#D4A87A"/>
  <!-- 眯眯眼（舒服表情） -->
  <path d="M72,100 Q80,94 88,100 Q80,106 72,100Z" fill="#5C3D2E"/>
  <path d="M112,100 Q120,94 128,100 Q120,106 112,100Z" fill="#5C3D2E"/>
  <circle cx="78" cy="98" r="3" fill="white" opacity="0.6"/>
  <circle cx="118" cy="98" r="3" fill="white" opacity="0.6"/>
  <ellipse cx="100" cy="112" rx="9" ry="6" fill="#8B5E3C"/>
  <ellipse cx="96" cy="113" rx="2.2" ry="1.8" fill="#5C3D2E"/>
  <ellipse cx="104" cy="113" rx="2.2" ry="1.8" fill="#5C3D2E"/>
  <path d="M94,118 Q100,122 106,118" stroke="#8B5E3C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="62" cy="106" rx="12" ry="7" fill="#F4A0A0" opacity="0.35"/>
  <ellipse cx="138" cy="106" rx="12" ry="7" fill="#F4A0A0" opacity="0.35"/>
  <!-- 水花 -->
  <circle cx="40" cy="160" r="8" fill="#A8D5E5" opacity="0.5"/>
  <circle cx="160" cy="158" r="6" fill="#A8D5E5" opacity="0.5"/>
  <circle cx="50" cy="150" r="5" fill="#A8D5E5" opacity="0.4"/>
</svg>
</div>

<p class="caption">左：基本款 · 中：开心款 · 右：游泳款</p>
<p class="caption" style="margin-top:8px;">全部为原创 SVG 矢量绘制，可无限缩放不放糊</p>

</body>
</html>
