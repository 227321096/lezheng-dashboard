<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨墨学习 · 乐正 Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
body { background: var(--bg); }

.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 20px;
  color: var(--accent); font-size: 0.9rem;
  text-decoration: none;
  margin: 24px 0 0 32px;
}
.back-btn:hover { opacity: 0.7; }

.page-header {
  text-align: center;
  padding: 32px 20px 16px;
}
.page-header h1 { font-size: 1.8rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.page-header .sub { color: var(--text-secondary); font-size: 0.9rem; }

.mm-grid {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px 60px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.mm-stat {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 22px 16px;
  text-align: center;
}
.mm-stat .num {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.mm-stat .num.accent { color: var(--accent); }
.mm-stat .num.orange { color: var(--orange); }
.mm-stat .label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 6px;
}

.mm-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 22px 24px;
  margin-bottom: 14px;
}
.mm-card h2 {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}
.record-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.record-item:last-child { border-bottom: none; }
.record-item .date { font-size: 0.9rem; color: var(--text-secondary); }
.record-item .count { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.record-item .count span { font-size: 0.75rem; font-weight: 400; color: var(--text-secondary); }

.today-words { display: flex; flex-wrap: wrap; gap: 8px; }
.word-chip {
  background: rgba(0,113,227,0.08);
  color: var(--accent);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 0.82rem;
  font-weight: 500;
}

.loading { text-align: center; padding: 40px; color: var(--text-secondary); }
.error-msg { text-align: center; padding: 40px; color: var(--red); }
.hidden { display: none; }
</style>
</head>
<body>

<a class="back-btn" href="index.html">← 返回首页</a>

<div class="page-header">
  <h1>📚 墨墨背单词</h1>
  <div class="sub" id="sub">加载中…</div>
</div>

<!-- Stats Row -->
<div class="mm-grid">
  <div class="mm-stat">
    <div class="num accent" id="statTotal">--</div>
    <div class="label">今日目标</div>
  </div>
  <div class="mm-stat">
    <div class="num" id="statFinished">--</div>
    <div class="label">已完成</div>
  </div>
  <div class="mm-stat">
    <div class="num orange" id="statTime">--</div>
    <div class="label">学习分钟</div>
  </div>
</div>

<div style="max-width:700px;margin:0 auto;padding:0 20px 60px">
  <!-- Today's Words -->
  <div class="mm-card" id="todayCard">
    <h2>今日待复习</h2>
    <div class="today-words" id="todayWords">
      <div class="loading">加载中…</div>
    </div>
  </div>

  <!-- Recent Records -->
  <div class="mm-card" id="recordsCard">
    <h2>最近学习记录</h2>
    <div id="recordsList">
      <div class="loading">加载中…</div>
    </div>
  </div>
</div>

<script>
var TOKEN = '48e725ab5b62032496eb647acd9e1174d1cd4f9c74027fe3e03b786f6793b6a8';
var API = 'https://open.maimemo.com/open/api/v1';

function api(path, method, body) {
  method = method || 'GET';
  body = body || {};
  var opts = {
    method: method,
    headers: {
      'Authorization': 'Bearer ' + TOKEN,
      'Accept': 'application/json',
      'Content-Type': 'application/json'
    }
  };
  if (method !== 'GET' && Object.keys(body).length > 0) {
    opts.body = JSON.stringify(body);
  }
  if (method === 'GET') {
    path = path + (path.indexOf('?') > -1 ? '&' : '?') + new URLSearchParams(body).toString();
  }
  return fetch(API + path, opts).then(function(r) { return r.json(); });
}

function renderStudyProgress(data) {
  var p = data.progress;
  document.getElementById('statTotal').textContent = p.total || 0;
  document.getElementById('statFinished').textContent = p.finished || 0;
  var mins = Math.round((p.study_time || 0) / 60);
  document.getElementById('statTime').textContent = mins || '0';
  document.getElementById('sub').textContent = p.total > 0
    ? ('今日进度: ' + p.finished + ' / ' + p.total + ' 词')
    : '今日暂无学习任务';
}

function renderTodayItems(data) {
  var el = document.getElementById('todayWords');
  if (!data.items || data.items.length === 0) {
    el.innerHTML = '<span style="color:var(--text-secondary);font-size:0.9rem">今日已全部完成 ✓</span>';
    return;
  }
  var html = '';
  data.items.slice(0, 30).forEach(function(item) {
    html += '<span class="word-chip">' + item.spelling + '</span>';
  });
  if (data.items.length > 30) {
    html += '<span class="word-chip">+' + (data.items.length - 30) + ' 更多</span>';
  }
  el.innerHTML = html;
}

function renderRecords(data) {
  var el = document.getElementById('recordsList');
  if (!data.records || data.records.length === 0) {
    el.innerHTML = '<div style="color:var(--text-secondary);font-size:0.9rem;text-align:center;padding:20px">暂无学习记录</div>';
    return;
  }
  var html = '';
  data.records.slice(0, 10).forEach(function(r) {
    var d = new Date(r.date);
    var dateStr = d.getMonth()+1 + '月' + d.getDate() + '日';
    html += '<div class="record-item">'
      + '<span class="date">' + dateStr + '</span>'
      + '<span class="count">' + r.finished + ' <span>词 · ' + Math.round(r.study_time/60) + '分钟</span></span>'
      + '</div>';
  });
  el.innerHTML = html;
}

function fail(msg) {
  document.getElementById('sub').textContent = '加载失败';
  document.getElementById('todayWords').innerHTML = '<div class="error-msg">' + msg + '</div>';
  document.getElementById('recordsList').innerHTML = '<div class="error-msg">' + msg + '</div>';
}

// Load all data
api('/study/get_study_progress', 'POST', {}).then(function(d) {
  if (d.success) renderStudyProgress(d.data);
  else fail(d.errors ? d.errors[0].msg : '获取学习进度失败');
});

api('/study/get_today_items', 'POST', {}).then(function(d) {
  if (d.success) renderTodayItems(d.data);
});

api('/study/query_study_records', 'POST', {}).then(function(d) {
  if (d.success) renderRecords(d.data);
});
</script>
</body>
</html>
