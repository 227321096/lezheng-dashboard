<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天气 · 乐正 Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
/* Weather Page */
body { background: var(--bg); }

.weather-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 20px;
  color: var(--accent); font-size: 0.9rem;
  text-decoration: none;
  margin: 24px 0 0 32px;
}
.weather-back:hover { opacity: 0.7; }

.page-header {
  text-align: center;
  padding: 32px 20px 8px;
}
.page-header h1 { font-size: 1.8rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.page-header .sub { color: var(--text-secondary); font-size: 0.9rem; }

.source-tag {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-secondary);
  padding: 6px 16px;
  background: rgba(0,0,0,0.04);
  border-radius: 100px;
  display: inline-block;
  margin: 8px auto 0;
}

/* Current conditions */
.current-card {
  max-width: 600px; margin: 20px auto;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 32px;
  text-align: center;
}
.current-loc { font-size: 1rem; color: var(--text-secondary); margin-bottom: 12px; font-weight: 500; }
.current-main { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 16px; }
.current-icon { font-size: 4rem; line-height: 1; }
.current-temp { font-size: 3.5rem; font-weight: 700; color: var(--text); line-height: 1; }
.current-detail { font-size: 0.95rem; color: var(--text-secondary); }
.current-detail span { margin: 0 8px; }

/* Hourly forecast */
.hourly-section { max-width: 640px; margin: 24px auto; padding: 0 20px 60px; }
.hourly-title { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.hourly-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; }
.hourly-scroll::-webkit-scrollbar { height: 4px; }
.hourly-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

.hour-card {
  flex-shrink: 0;
  background: var(--white);
  border-radius: 10px;
  padding: 14px 12px;
  min-width: 80px;
  text-align: center;
  box-shadow: var(--shadow);
}
.hour-card.now { border: 2px solid var(--accent); }
.hour-time { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; }
.hour-icon { font-size: 1.6rem; margin-bottom: 4px; }
.hour-temp { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.hour-hum { font-size: 0.72rem; color: var(--text-secondary); margin-top: 2px; }

.loading { text-align: center; padding: 60px; color: var(--text-secondary); }
.error-msg { text-align: center; padding: 40px; color: var(--red); }
</style>
</head>
<body>

<a class="weather-back" href="index.html">← 返回首页</a>

<div class="page-header">
  <h1 id="pageTitle">天气预报</h1>
  <div class="sub" id="pageSub">正在定位…</div>
  <div class="source-tag">数据来源：Open-Meteo (open-meteo.com) · 地理编码：OpenStreetMap Nominatim</div>
</div>

<div class="current-card">
  <div class="current-loc" id="locName">--</div>
  <div class="current-main">
    <div class="current-icon" id="curIcon">--</div>
    <div class="current-temp" id="curTemp">--°C</div>
  </div>
  <div class="current-detail">
    <span id="curHum">湿度 --%</span>
    <span>·</span>
    <span id="curWind">风速 --km/h</span>
    <span>·</span>
    <span id="curDesc">--</span>
  </div>
</div>

<div class="hourly-section">
  <div class="hourly-title">每时天气 · 近4小时 + 未来24小时</div>
  <div class="hourly-scroll" id="hourlyList">
    <div class="loading">加载中…</div>
  </div>
</div>

<script>
// ——— Weather Utilities ———
function getWeatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 49) return '🌫';
  if (code <= 59) return '🌧';
  if (code <= 69) return '🌧';
  if (code <= 79) return '🌨';
  if (code <= 84) return '🌨';
  if (code <= 86) return '❄️';
  if (code <= 99) return '⛈';
  return '🌤';
}
function getWeatherDesc(code) {
  if (code === 0) return '晴朗';
  if (code <= 3) return '多云';
  if (code <= 49) return '雾';
  if (code <= 59) return '毛毛雨';
  if (code <= 69) return '降雨';
  if (code <= 79) return '小雪';
  if (code <= 84) return '阵雨';
  if (code <= 86) return '大雪';
  if (code <= 99) return '雷暴';
  return '未知';
}

function parseHourly(data) {
  var times = data.hourly.time;
  var codes = data.hourly.weather_code;
  var temps = data.hourly.temperature_2m;
  var hums = data.hourly.relative_humidity_2m;
  var winds = data.hourly.wind_speed_10m;

  // Use API timezone (Asia/Shanghai) for consistent hour comparison
  var tzOffset = 8; // GMT+8 for Shanghai
  var now = new Date();
  var nowTs = now.getTime();
  var nowSH = new Date(now.getTime() + (8 - now.getTimezoneOffset()/60) * 3600000);
  var currentSHHour = nowSH.getHours();

  var cards = [];
  var started = false;
  for (var i = 0; i < times.length; i++) {
    var t = new Date(times[i]);
    // Include: from 4h ago to 24h ahead
    var diff = t - nowTs;
    if (diff < -4 * 3600000) continue; // skip >4h in the past
    if (cards.length >= 28) break;      // max 28 cards

    // Determine label
    var shTime = new Date(t.getTime() + (8 - t.getTimezoneOffset()/60) * 3600000);
    var shHour = shTime.getHours();
    var label;
    var isNow = false;
    if (Math.abs(diff) < 3600000) {
      label = '现在'; isNow = true;
    } else if (diff < 0) {
      label = '-' + Math.round(-diff / 3600000) + 'h';
    } else {
      label = shHour + '时';
    }

    cards.push({
      label: label,
      icon: getWeatherIcon(codes[i]),
      temp: Math.round(temps[i]) + '°',
      hum: hums[i] + '%',
      wind: Math.round(winds[i]) + 'km/h',
      isNow: isNow
    });
  }
  return cards;
}

function renderHourly(cards) {
  var el = document.getElementById('hourlyList');
  el.innerHTML = '';
  cards.forEach(function(c) {
    var div = document.createElement('div');
    div.className = 'hour-card' + (c.isNow ? ' now' : '');
    div.innerHTML = '<div class="hour-time">' + c.label + '</div>'
      + '<div class="hour-icon">' + c.icon + '</div>'
      + '<div class="hour-temp">' + c.temp + '</div>'
      + '<div class="hour-hum">💧 ' + c.hum + '</div>';
    el.appendChild(div);
  });
}

function renderCurrent(data, district) {
  var c = data.current;
  document.getElementById('locName').textContent = district;
  document.getElementById('curIcon').textContent = getWeatherIcon(c.weather_code);
  document.getElementById('curTemp').textContent = Math.round(c.temperature_2m) + '°C';
  document.getElementById('curHum').textContent = '湿度 ' + c.relative_humidity_2m + '%';
  document.getElementById('curWind').textContent = '风速 ' + Math.round(c.wind_speed_10m) + 'km/h';
  document.getElementById('curDesc').textContent = getWeatherDesc(c.weather_code);
  document.getElementById('pageSub').textContent = district + ' · 实时天气';
}

function fail(msg) {
  document.getElementById('hourlyList').innerHTML = '<div class="error-msg">' + msg + '</div>';
}

// ——— Init ———
var lat = null, lon = null, district = '上饶';

function loadWeather(latitude, longitude, locationName) {
  lat = latitude; lon = longitude; district = locationName;
  fetch('https://api.open-meteo.com/v1/forecast?'
    + 'latitude=' + lat + '&longitude=' + lon
    + '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m'
    + '&hourly=weather_code,temperature_2m,relative_humidity_2m,wind_speed_10m'
    + '&timezone=Asia/Shanghai&forecast_days=2')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    renderCurrent(data, district);
    var cards = parseHourly(data);
    renderHourly(cards);
  })
  .catch(function(e) { fail('加载失败: ' + e.message); });
}

function start() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var lat = pos.coords.latitude.toFixed(4);
        var lon = pos.coords.longitude.toFixed(4);
        // Reverse geocode district name
        fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=zh')
          .then(function(r) { return r.json(); })
          .then(function(geo) {
            var addr = geo.address || {};
            var d = addr.county || addr.district || addr.city || addr.town || '未知';
            loadWeather(lat, lon, d);
          })
          .catch(function() { loadWeather(lat, lon, '当前地点'); });
      },
      function() { loadWeather(28.47, 117.94, '江西上饶'); },
      {timeout: 8000}
    );
  } else {
    loadWeather(28.47, 117.94, '江西上饶');
  }
}

start();
</script>
</body>
</html>
