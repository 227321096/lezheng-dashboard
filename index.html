<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乐正 · Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
/* Dashboard-specific overrides */
html { scroll-behavior: smooth; }

.hero-sub { font-size: 1rem; color: #86868b; margin-top: 8px; }

/* Profile bar */
.profile-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 24px;
}
.profile-chip {
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 0.75rem;
  color: #86868b;
}
.profile-chip span { color: #0071e3; font-weight: 600; }

/* Clock widget */
.clock-wrap { text-align: center; padding: 48px 20px 20px; }
#clockTime { font-size: 4rem; font-weight: 700; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
#clockSec { font-size: 1.2rem; color: #86868b; font-weight: 400; }
#clockDate { font-size: 0.85rem; color: #86868b; margin-top: 4px; }
</style>
</head>
<body>

<!-- Nav -->
<nav class="apple-nav">
  <a href="index.html" class="active">首页</a>
  <a href="data.html">公考板块</a>
  <a href="dreams.html">梦境</a>
  <div class="spacer"></div>
  <span class="nav-title">乐正 · Dashboard</span>
</nav>

<!-- Hero -->
<div class="apple-hero">
  <h1 id="greetingTitle">你好，程乐正</h1>
  <p>这里是属于你的个人数据中枢，所有生成的内容都在这里。</p>
  <div class="profile-bar"></div>
  <a class="weather-widget" id="weatherWidget" href="weather.html">
    <span class="weather-icon" id="wIcon">⏳</span>
    <span class="weather-temp" id="wTemp">--°C</span>
    <span class="weather-sep">·</span>
    <span class="weather-humidity" id="wHum">--%</span>
  </a>
  <div class="weather-tip" id="wTip">--</div>
</div>

<!-- Clock -->
<div class="clock-wrap">
  <div id="clockTime">--:--</div>
  <div id="clockSec">--</div>
  <div id="clockDate"></div>
</div>

<!-- Grid -->
<div class="apple-grid">

  <a href="data.html" class="apple-card">
    <div class="card-icon">📋</div>
    <div class="card-title">公考板块</div>
    <div class="card-desc">国考 · 省考岗位数据汇总，持续更新</div>
    <div class="card-tags">
      <span class="apple-tag tag-blue">国考</span>
      <span class="apple-tag tag-green">省考</span>
    </div>
  </a>

  <a href="dreams.html" class="apple-card">
    <div class="card-icon">🌙</div>
    <div class="card-title">OpenClaw 梦境</div>
    <div class="card-desc">记录每一次重要判断时的思考与反思</div>
    <div class="card-tags">
      <span class="apple-tag tag-purple">实时记录</span>
    </div>
  </a>

  <a href="logs.html" class="apple-card">
    <div class="card-icon">📊</div>
    <div class="card-title">运行日志</div>
    <div class="card-desc">OpenClaw 日常运行记录</div>
    <div class="card-tags">
      <span class="apple-tag tag-orange">日志</span>
    </div>
  </a>

</div>

<!-- Footer -->
<div class="apple-footer">
  OpenClaw · 个人 Dashboard · 由 AI 驱动
</div>

<script>
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = h + ':' + m;
  document.getElementById('clockSec').textContent = s;
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('clockDate').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + days[now.getDay()];
  // Time-based greeting
  var hour = now.getHours();
  var greet = '';
  if (hour >= 5 && hour < 11) greet = '早上好';
  else if (hour >= 11 && hour < 13) greet = '中午好';
  else if (hour >= 13 && hour < 18) greet = '下午好';
  else if (hour >= 18 && hour < 22) greet = '晚上好';
  else greet = '夜深了';
  document.getElementById('greetingTitle').textContent = greet + '，程乐正';
}
setInterval(updateClock, 1000);
updateClock();

// ——— Weather Widget ———
// GPS优先 → Open-Meteo实时数据（无key，支持CORS）
function getWeatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 49) return '🌫';
  if (code <= 59) return '🌧';
  if (code <= 69) return '🌧';
  if (code <= 79) return '🌨';
  if (code <= 84) return '🌨';
  if (code <= 86) return '❄️';
  if (code <= 99) return '⛈';
  return '🌤';
}
function getWeatherTip(code, temp) {
  var t = Math.round(temp);
  if (code === 0 && t > 28) return '紫外线较强，户外注意防晒';
  if (code === 0 && t > 20) return '今日晴朗，适宜户外活动';
  if (code === 0) return '天气晴好，宜通风晾晒';
  if (code <= 3) return '多云天气，外出请合时衣物';
  if (code <= 49) return '有雾，能见度较差，出行注意安全';
  if (code <= 69) return '有雨，出门记得带伞';
  if (code <= 79) return '有雪，注意防寒保暖';
  if (code <= 84) return '阵雨频繁，外出请带伞';
  if (code <= 86) return '大雪天气，建议减少外出';
  if (code <= 99) return '雷暴天气，避免户外活动';
  if (t >= 35) return '高温预警，注意防暑降温';
  if (t <= 5) return '气温较低，注意防寒保暖';
  return '天气变化快，出行请留意最新预报';
}
function showWeather(icon, temp, humidity, code) {
  document.getElementById('wIcon').textContent = icon;
  document.getElementById('wTemp').textContent = Math.round(temp) + '°C';
  document.getElementById('wHum').textContent = humidity + '%';
  document.getElementById('wTip').textContent = getWeatherTip(code, temp);
}
function loadByCoords(lat, lon) {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon
    + '&current=temperature_2m,relative_humidity_2m,weather_code&timezone=Asia/Shanghai')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var c = data.current;
    showWeather(getWeatherIcon(c.weather_code), c.temperature_2m, c.relative_humidity_2m, c.weather_code);
  })
  .catch(function() {
    document.getElementById('wIcon').textContent = '🌤';
    document.getElementById('wTemp').textContent = '--°C';
    document.getElementById('wHum').textContent = '--%';
    document.getElementById('wTip').textContent = '天气加载失败，请检查网络';
  });
}
function loadByIP() {
  fetch('https://ipapi.co/json/')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var lat = d.latitude, lon = d.longitude;
      loadByCoords(lat.toFixed(4), lon.toFixed(4));
    })
    .catch(function() {
      loadByCoords(28.47, 117.94);
    });
}
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    function(pos) { loadByCoords(pos.coords.latitude.toFixed(4), pos.coords.longitude.toFixed(4)); },
    function() { loadByIP(); },
    {timeout: 8000}
  );
} else {
  loadByIP();
}
</script>

</body>
</html>
