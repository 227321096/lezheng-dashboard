<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乐正 · Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
/* Dashboard-specific overrides */
html { scroll-behavior: smooth; }

.hero-sub { font-size: 1rem; color: #86868b; margin-top: 8px; }

/* Profile bar */
.profile-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 24px;
}
.profile-chip {
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: 0.75rem;
  color: #86868b;
}
.profile-chip span { color: #0071e3; font-weight: 600; }

/* Clock widget */
.clock-wrap { text-align: center; padding: 48px 20px 20px; }
#clockTime { font-size: 4rem; font-weight: 700; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
#clockSec { font-size: 1.2rem; color: #86868b; font-weight: 400; }
#clockDate { font-size: 0.85rem; color: #86868b; margin-top: 4px; }
</style>
</head>
<body>

<!-- Nav -->
<nav class="apple-nav">
  <a href="index.html" class="active">首页</a>
  <a href="data.html">公考板块</a>
  <a href="dreams.html">梦境</a>
  <div class="spacer"></div>
  <span class="nav-title">乐正 · Dashboard</span>
</nav>

<!-- Hero -->
<div class="apple-hero">
  <h1>你好，乐正</h1>
  <p>这里是属于你的个人数据中枢，所有生成的内容都在这里。</p>
  <div class="profile-bar"></div>
  <div class="weather-widget" id="weatherWidget">
    <span class="weather-loc" id="wLoc">定位中…</span>
    <span class="weather-icon" id="wIcon">--</span>
    <span class="weather-temp" id="wTemp">--</span>
    <span class="weather-detail" id="wDetail">--</span>
  </div>
</div>

<!-- Clock -->
<div class="clock-wrap">
  <div id="clockTime">--:--</div>
  <div id="clockSec">--</div>
  <div id="clockDate"></div>
</div>

<!-- Grid -->
<div class="apple-grid">

  <a href="data.html" class="apple-card">
    <div class="card-icon">📋</div>
    <div class="card-title">公考板块</div>
    <div class="card-desc">国考 · 省考岗位数据汇总，持续更新</div>
    <div class="card-tags">
      <span class="apple-tag tag-blue">国考</span>
      <span class="apple-tag tag-green">省考</span>
    </div>
  </a>

  <a href="dreams.html" class="apple-card">
    <div class="card-icon">🌙</div>
    <div class="card-title">OpenClaw 梦境</div>
    <div class="card-desc">记录每一次重要判断时的思考与反思</div>
    <div class="card-tags">
      <span class="apple-tag tag-purple">实时记录</span>
    </div>
  </a>

  <a href="logs.html" class="apple-card">
    <div class="card-icon">📊</div>
    <div class="card-title">运行日志</div>
    <div class="card-desc">OpenClaw 日常运行记录</div>
    <div class="card-tags">
      <span class="apple-tag tag-orange">日志</span>
    </div>
  </a>

</div>

<!-- Footer -->
<div class="apple-footer">
  OpenClaw · 个人 Dashboard · 由 AI 驱动
</div>

<script>
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = h + ':' + m;
  document.getElementById('clockSec').textContent = s;
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('clockDate').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + days[now.getDay()];
}
setInterval(updateClock, 1000);
updateClock();

// ——— Weather Widget ———
// Strategy: GPS (Geolocation API) → Open-Meteo → IP fallback → wttr.in
var weatherDone = false;

function getWeatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 49) return '🌫';
  if (code <= 59) return '🌧';
  if (code <= 69) return '🌧';
  if (code <= 79) return '🌨';
  if (code <= 84) return '🌨';
  if (code <= 86) return '❄️';
  if (code <= 99) return '⛈';
  return '🌤';
}

function renderWeather(location, icon, temp, humidity, wind) {
  if (weatherDone) return;
  weatherDone = true;
  document.getElementById('wLoc').textContent = location;
  document.getElementById('wIcon').textContent = icon;
  document.getElementById('wTemp').textContent = temp;
  document.getElementById('wDetail').textContent = humidity + ' ' + wind;
}

// Mode A: GPS → Open-Meteo (precise, no API key)
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude.toFixed(4);
      var lon = pos.coords.longitude.toFixed(4);

      // Fetch weather by coordinates
      fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=Asia/Shanghai')
        .then(r => r.json())
        .then(data => {
          var curr = data.current;
          var icon = getWeatherIcon(curr.weather_code);
          var temp = Math.round(curr.temperature_2m) + '°C';
          var humidity = curr.relative_humidity_2m + '%';
          var wind = Math.round(curr.wind_speed_10m) + 'km/h';

          // Reverse geocode to get district name
          fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=zh')
            .then(r => r.json())
            .then(geo => {
              var district = '';
              var addr = geo.address || {};
              district = addr.county || addr.district || addr.city || addr.town || addr.province || '未知';
              renderWeather(district, icon, temp, humidity, wind);
            })
            .catch(() => {
              renderWeather('上饶', icon, temp, humidity, wind);
            });
        })
        .catch(function() {
          tryIP();
        });
    },
    function(err) {
      tryIP();
    },
    {timeout: 8000}
  );
} else {
  tryIP();
}

// Mode B: IP-based fallback → wttr.in
function tryIP() {
  fetch('https://ipapi.co/json/')
    .then(r => r.json())
    .then(ip => {
      var city = ip.city || '';
      var region = ip.region || '';
      var loc = city || region || '上饶';
      fetch('https://wttr.in/' + encodeURIComponent(loc) + '?format=%c+%t+%h+%w&lang=zh&m')
        .then(r => r.text())
        .then(txt => {
          var parts = txt.trim().split(' ');
          var icon = parts[0] || '🌤';
          var temp = parts[1] || '--';
          var humidity = parts[2] || '--';
          var wind = parts.slice(3).join(' ') || '--';
          renderWeather(city || region || '未知', icon, temp, humidity, wind);
        })
        .catch(function() {
          renderWeather('上饶', '🌤', '--', '--', '--');
        });
    })
    .catch(function() {
      renderWeather('上饶', '🌤', '--', '--', '--');
    });
}
</script>

</body>
</html>
