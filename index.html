<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · 乐正</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --glass-bg: rgba(255, 255, 255, 0.12);
  --glass-border: rgba(255, 255, 255, 0.25);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  --accent-blue: #60a5fa;
  --accent-pink: #f472b6;
  --accent-purple: #c084fc;
  --text-primary: rgba(255, 255, 255, 0.95);
  --text-muted: rgba(255, 255, 255, 0.6);
}

body {
  font-family: 'Outfit', 'Noto Sans SC', -apple-system, sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── Background ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(96, 165, 250, 0.5) 0%, transparent 60%),
    radial-gradient(ellipse 70% 50% at 80% 80%, rgba(244, 114, 182, 0.45) 0%, transparent 55%),
    radial-gradient(ellipse 60% 80% at 60% 10%, rgba(192, 132, 252, 0.35) 0%, transparent 60%),
    linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4c1d6b 60%, #1e1140 100%);
}

/* ── Particles ── */
.particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}
@keyframes float {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* ── Layout ── */
.content {
  position: relative;
  z-index: 2;
  max-width: 520px;
  margin: 0 auto;
  padding: 48px 28px 40px;
  height: 100vh;
  overflow-y: auto;
}

/* ── Glass Card ── */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: var(--glass-shadow);
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 40px;
}
.greeting {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.name {
  font-size: 34px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -1px;
  line-height: 1;
}
.name span {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topbar-right {
  text-align: right;
  padding-top: 4px;
}
.weather-icon { font-size: 30px; line-height: 1; margin-bottom: 4px; }
.weather-temp {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}
.weather-loc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── Clock ── */
.clock-section { margin-bottom: 36px; }
.clock-main {
  font-size: 88px;
  font-weight: 200;
  color: var(--text-primary);
  line-height: 1;
  letter-spacing: -6px;
  font-variant-numeric: tabular-nums;
}
.clock-sec {
  font-size: 32px;
  font-weight: 200;
  color: var(--text-muted);
  vertical-align: super;
  letter-spacing: -1px;
  margin-left: 4px;
}
.clock-date {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 10px;
  letter-spacing: 0.5px;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  margin-bottom: 28px;
}

/* ── Info Row ── */
.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.info-card {
  padding: 18px 20px;
  transition: all 0.25s ease;
}
.info-card:hover {
  background: rgba(255, 255, 255, 0.18);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.25);
}
.info-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.info-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.info-icon { font-size: 20px; margin-bottom: 8px; }

/* ── Quote ── */
.quote-card {
  padding: 18px 22px;
  margin-bottom: 20px;
  border-left: 2px solid;
  border-image: linear-gradient(180deg, var(--accent-blue), var(--accent-pink)) 1;
}
.quote-text {
  font-size: 13px;
  line-height: 1.75;
  color: var(--text-primary);
  font-style: normal;
}
.quote-author { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

/* ── Logs Link ── */
.logs-card {
  padding: 18px 22px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.25s ease;
  text-decoration: none;
  color: inherit;
}
.logs-card:hover {
  background: rgba(255,255,255,0.18);
  transform: translateY(-2px);
}
.logs-title { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.logs-link { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.logs-arrow { font-size: 18px; color: var(--text-muted); }

/* ── Memo ── */
.memo-card {
  padding: 20px 22px;
  margin-bottom: 20px;
}
.memo-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.memo-input-row { display: flex; gap: 8px; }
.memo-input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.memo-input:focus { border-color: var(--accent-blue); }
.memo-input::placeholder { color: var(--text-muted); }
.memo-btn {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
  border: none;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 10px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.memo-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.memo-list { margin-top: 12px; }
.memo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
  color: var(--text-primary);
}
.memo-item:last-child { border-bottom: none; }
.memo-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
  flex-shrink: 0;
  transition: all 0.2s;
}
.memo-check.done {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
  border-color: transparent;
}
.memo-text { flex: 1; cursor: pointer; line-height: 1.5; }
.memo-text.done { text-decoration: line-through; color: var(--text-muted); }
.memo-empty { text-align: center; font-size: 11px; color: var(--text-muted); padding: 10px 0; }

/* ── Scrollbar ── */
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="content">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="greeting" id="greeting">下午好</div>
      <div class="name">程乐<span>正</span></div>
    </div>
    <div class="topbar-right">
      <div class="weather-icon" id="weatherIcon">🌤️</div>
      <div class="weather-temp" id="weatherTemp">--°</div>
      <div class="weather-loc" id="weatherLoc">江西</div>
    </div>
  </div>

  <!-- Clock -->
  <div class="clock-section">
    <div class="clock-main">
      <span id="clockTime">--:--</span><span class="clock-sec" id="clockSec">--</span>
    </div>
    <div class="clock-date" id="clockDate">----年--月--日 星期--</div>
  </div>

  <div class="divider"></div>

  <!-- Info row -->
  <div class="info-row">
    <div class="info-card glass">
      <div class="info-icon">📍</div>
      <div class="info-label">位置</div>
      <div class="info-value" id="ipInfo">--</div>
    </div>
    <div class="info-card glass">
      <div class="info-icon">🗓</div>
      <div class="info-label">日期</div>
      <div class="info-value" id="todayInfo">--</div>
    </div>
  </div>

  <!-- Quote -->
  <div class="quote-card glass">
    <div class="quote-text" id="quote">"loading..."</div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

  <!-- Logs link -->
  <a href="logs.html" class="logs-card glass">
    <div>
      <div class="logs-title">📊 每日日志</div>
      <div class="logs-link">查看运行日志</div>
    </div>
    <div class="logs-arrow">→</div>
  </a>

  <!-- Memo -->
  <div class="memo-card glass">
    <div class="memo-title">备忘</div>
    <div class="memo-list" id="memoList"></div>
    <div class="memo-input-row">
      <input class="memo-input" id="memoInput" placeholder="写点什么..." onkeydown="if(event.key==='Enter')addMemo()">
      <button class="memo-btn" onclick="addMemo()">添加</button>
    </div>
  </div>

</div>

<script>
/* ── Clock ── */
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = h + ':' + m;
  document.getElementById('clockSec').textContent = s;
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('clockDate').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + days[now.getDay()];
}
setInterval(updateClock, 1000);
updateClock();

/* ── Greeting ── */
function updateGreeting() {
  var h = new Date().getHours();
  var t = h < 6 ? '凌晨好' : h < 9 ? '早上好' : h < 12 ? '上午好' : h < 14 ? '中午好' : h < 18 ? '下午好' : h < 22 ? '晚上好' : '夜深了';
  document.getElementById('greeting').textContent = t;
}
updateGreeting();

/* ── IP Location ── */
async function fetchIP() {
  try {
    var r = await fetch('https://ipinfo.io/json');
    var d = await r.json();
    document.getElementById('ipInfo').textContent = d.city ? (d.city + ', ' + d.country) : d.ip;
    document.getElementById('todayInfo').textContent = new Date().toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit'});
  } catch(e) {
    document.getElementById('ipInfo').textContent = '无法获取';
    document.getElementById('todayInfo').textContent = new Date().toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit'});
  }
}
fetchIP();

/* ── Weather ── */
async function fetchWeather() {
  try {
    var r = await fetch('https://wttr.in/Jiangxi?format=%c+%t+%C&lang=zh');
    var t = await r.text();
    var parts = t.trim().split(/\s+/);
    document.getElementById('weatherIcon').textContent = parts[0] || '☀️';
    document.getElementById('weatherTemp').textContent = (parts[1] || '+26').replace('C','') + '°';
    document.getElementById('weatherLoc').textContent = parts[2] || '江西';
  } catch(e) {
    document.getElementById('weatherTemp').textContent = '+26°';
  }
}
fetchWeather();

/* ── Quote ── */
var quotes = [
  ['代码是写给人读的，顺便让机器运行。', 'Donald Knuth'],
  ['大道至简，复杂的系统往往来自简单的想法的堆积。', 'Richard Feynman'],
  ['行动胜于分析。', 'Jeff Bezos'],
  ['最好的代码就是没有代码。', 'Jeff Atwood'],
  ['简单是终极的复杂。', 'Leonardo da Vinci'],
  ['保持简单，让复杂性自然产生。', 'John Maeda'],
];
var qi = quotes[Math.floor(Math.random() * quotes.length)];
document.getElementById('quote').textContent = '"' + qi[0] + '"';
document.getElementById('quoteAuthor').textContent = '— ' + qi[1];

/* ── Particles ── */
var colors = ['rgba(96,165,250,0.6)', 'rgba(244,114,182,0.6)', 'rgba(192,132,252,0.6)', 'rgba(255,255,255,0.4)'];
for (var i = 0; i < 20; i++) {
  var p = document.createElement('div');
  p.className = 'particle';
  var size = 4 + Math.random() * 10;
  var color = colors[Math.floor(Math.random() * colors.length)];
  p.style.cssText =
    'width:' + size + 'px;' +
    'height:' + size + 'px;' +
    'background:' + color + ';' +
    'left:' + (Math.random() * 100) + '%;' +
    'animation-duration:' + (14 + Math.random() * 16) + 's;' +
    'animation-delay:' + (Math.random() * 14) + 's;' +
    'box-shadow:0 0 ' + (size * 2) + 'px ' + color;
  document.getElementById('particles').appendChild(p);
}

/* ── Memo ── */
var memos = [];
function loadMemos() { memos = JSON.parse(localStorage.getItem('dashMemos3') || '[]'); renderMemos(); }
function renderMemos() {
  var list = document.getElementById('memoList');
  if (memos.length === 0) { list.innerHTML = '<div class="memo-empty">记录点什么吧~</div>'; return; }
  var html = '';
  for (var i = 0; i < memos.length; i++) {
    var m = memos[i];
    html += '<div class="memo-item"><div class="memo-check ' + (m.done?'done':'') + '" onclick="toggleMemo(' + i + ')">' + (m.done?'✓':'') + '</div><div class="memo-text ' + (m.done?'done':'') + '" onclick="toggleMemo(' + i + ')">' + m.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div></div>';
  }
  list.innerHTML = html;
}
function addMemo() {
  var text = document.getElementById('memoInput').value.trim();
  if (!text) return;
  memos.push({text: text, done: false});
  document.getElementById('memoInput').value = '';
  localStorage.setItem('dashMemos3', JSON.stringify(memos));
  renderMemos();
}
function toggleMemo(i) { memos[i].done = !memos[i].done; localStorage.setItem('dashMemos3', JSON.stringify(memos)); renderMemos(); }
loadMemos();
</script>
</body>
</html>
