<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #faf7fb;
  --card: rgba(255,255,255,0.85);
  --border: rgba(200,180,220,0.2);
  --text: #4a3f5a;
  --text-muted: #9a8ab0;
  --accent: #e879c9;
  --accent-light: #f5d0ef;
  --shadow: 0 2px 24px rgba(200,100,180,0.08);
  --shadow-hover: 0 8px 32px rgba(200,100,180,0.15);
  --radius: 28px;
}

body {
  min-height: 100vh;
  font-family: 'Outfit', -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
}

.content {
  max-width: 420px;
  margin: 0 auto;
  padding: 40px 20px 32px;
  height: 100vh;
  overflow-y: auto;
}

/* ── Hero ── */
.hero {
  text-align: center;
  margin-bottom: 28px;
}
.hero-greeting {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.hero-name {
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}
.hero-name span { color: var(--accent); }

/* ── Clock ── */
.clock-wrap {
  text-align: center;
  margin-bottom: 28px;
}
.clock-time {
  font-size: 88px;
  font-weight: 200;
  color: var(--text);
  line-height: 1;
  letter-spacing: -6px;
  font-variant-numeric: tabular-nums;
  position: relative;
  display: inline-block;
}
.clock-seconds {
  font-size: 28px;
  font-weight: 200;
  color: var(--text-muted);
  vertical-align: super;
  letter-spacing: -2px;
  margin-left: 2px;
}
.clock-date {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 0 0 24px;
}

/* ── Card ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  transition: box-shadow 0.3s;
}
.card:hover { box-shadow: var(--shadow-hover); }

/* ── Info row ── */
.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.info-card {
  background: var(--card);
  border-radius: 22px;
  padding: 16px 18px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.info-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
.info-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.info-value { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.1; }
.info-value.lg { font-size: 28px; font-weight: 200; color: var(--text); letter-spacing: -1px; }
.info-icon { font-size: 20px; margin-bottom: 6px; }

/* ── Weather ── */
.weather-card {
  background: linear-gradient(135deg, #fff5fb 0%, #fce4ec 100%);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255,182,216,0.25);
}
.weather-icon { font-size: 44px; line-height: 1; }
.weather-temp { font-size: 42px; font-weight: 200; color: var(--text); line-height: 1; letter-spacing: -2px; }
.weather-city { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ── Quote ── */
.quote-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 22px;
  margin-bottom: 16px;
  border-left: 3px solid var(--accent-light);
  box-shadow: var(--shadow);
}
.quote-text {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  font-style: normal;
}
.quote-author {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* ── Links ── */
.links-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.link-card {
  background: var(--card);
  border-radius: 18px;
  padding: 14px 6px;
  text-align: center;
  text-decoration: none;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.link-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
.link-icon { font-size: 22px; }
.link-name { font-size: 10px; color: var(--text-muted); font-weight: 500; }

/* ── Memo ── */
.memo-input-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.memo-input {
  flex: 1;
  background: rgba(255,255,255,0.8);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 8px 14px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.memo-input:focus { border-color: var(--accent); }
.memo-input::placeholder { color: var(--text-muted); }
.memo-submit {
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 12px;
  padding: 8px 14px;
  border-radius: 14px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.memo-submit:hover { opacity: 0.85; }
.memo-list { margin-top: 8px; }
.memo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text);
}
.memo-item:last-child { border-bottom: none; }
.memo-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--accent-light);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #fff;
  transition: all 0.2s;
}
.memo-check.done { background: var(--accent); border-color: var(--accent); }
.memo-text { flex: 1; cursor: pointer; line-height: 1.5; }
.memo-text.done { text-decoration: line-through; color: var(--text-muted); }
.memo-empty { text-align: center; font-size: 11px; color: var(--text-muted); padding: 10px 0; }

/* ── Particles ── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle {
  position: absolute;
  font-size: 14px;
  animation: rise linear infinite;
  opacity: 0;
  filter: drop-shadow(0 0 6px rgba(232,121,201,0.3));
}
@keyframes rise {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.5; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="content">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-greeting" id="greeting">下午好</div>
    <div class="hero-name">程<span>乐</span>正</div>
  </div>

  <!-- Clock -->
  <div class="clock-wrap">
    <div class="clock-time">
      <span id="clockHour">--</span><span class="clock-seconds" id="clockSec">--</span>
    </div>
    <div class="clock-date" id="clockDate">----年--月--日</div>
  </div>

  <div class="divider"></div>

  <!-- Weather -->
  <div class="weather-card">
    <div class="weather-icon" id="weatherIcon">🌤</div>
    <div>
      <div class="weather-temp" id="weatherTemp">--°</div>
      <div class="weather-city" id="weatherCity">定位中...</div>
    </div>
  </div>

  <!-- Info row: IP + Date -->
  <div class="info-row">
    <div class="info-card">
      <div class="info-icon">📍</div>
      <div class="info-label">IP 位置</div>
      <div class="info-value" id="ipInfo">--</div>
    </div>
    <div class="info-card">
      <div class="info-icon">🗓</div>
      <div class="info-label">今日</div>
      <div class="info-value" id="todayInfo">--</div>
    </div>
  </div>

  <!-- Quote -->
  <div class="quote-card">
    <div class="quote-text" id="quote">"loading..."</div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

  <!-- Links -->
  <div class="links-grid">
    <a class="link-card" href="https://github.com" target="_blank">
      <span class="link-icon">🐱</span>
      <span class="link-name">GitHub</span>
    </a>
    <a class="link-card" href="https://mail.google.com" target="_blank">
      <span class="link-icon">📧</span>
      <span class="link-name">邮箱</span>
    </a>
    <a class="link-card" href="https://chat.deepseek.com" target="_blank">
      <span class="link-icon">🤖</span>
      <span class="link-name">DeepSeek</span>
    </a>
    <a class="link-card" href="https://www.notion.so" target="_blank">
      <span class="link-icon">📝</span>
      <span class="link-name">Notion</span>
    </a>
  </div>

  <!-- Memo -->
  <div class="card">
    <div class="info-label" style="margin-bottom:8px">📝 备忘</div>
    <div class="memo-list" id="memoList"></div>
    <div class="memo-input-row">
      <input class="memo-input" id="memoInput" placeholder="添加备忘..." onkeydown="if(event.key==='Enter')addMemo()">
      <button class="memo-submit" onclick="addMemo()">添加</button>
    </div>
  </div>

</div>

<script>
// ── Clock ──
var lastRefresh = new Date();

function updateClock() {
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  document.getElementById('clockHour').textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  document.getElementById('clockSec').textContent = String(s).padStart(2,'0');
  var days = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('clockDate').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + days[now.getDay()];
}
setInterval(updateClock, 1000);
updateClock();

// ── Greeting ──
function updateGreeting() {
  var h = new Date().getHours();
  var t = h < 6 ? '凌晨好' : h < 9 ? '早上好' : h < 12 ? '上午好' : h < 14 ? '中午好' : h < 18 ? '下午好' : h < 22 ? '晚上好' : '夜深了';
  document.getElementById('greeting').textContent = t;
}
updateGreeting();

// ── IP ──
async function fetchIP() {
  try {
    var r = await fetch('https://ipinfo.io/json');
    var d = await r.json();
    document.getElementById('ipInfo').textContent = d.city ? (d.city + ', ' + d.country) : d.ip;
    document.getElementById('todayInfo').textContent = new Date().toLocaleDateString('zh-CN', {month:'numeric',day:'numeric'});
  } catch(e) {
    document.getElementById('ipInfo').textContent = '无法获取';
    document.getElementById('todayInfo').textContent = new Date().toLocaleDateString('zh-CN', {month:'numeric',day:'numeric'});
  }
}
fetchIP();

// ── Weather (Jiangxi fixed) ──
async function fetchWeather() {
  try {
    var r = await fetch('https://wttr.in/Jiangxi?format=%c+%t+%C&lang=zh');
    var t = await r.text();
    var parts = t.trim().split(/\s+/);
    document.getElementById('weatherIcon').textContent = parts[0] || '☀️';
    document.getElementById('weatherTemp').textContent = (parts[1] || '+26').replace('C','') + '°';
    document.getElementById('weatherCity').textContent = parts[2] || '江西';
  } catch(e) {
    document.getElementById('weatherTemp').textContent = '+26°';
    document.getElementById('weatherCity').textContent = '江西';
  }
}
fetchWeather();

// ── Quote ──
var quotes = [
  ['代码是写给人读的，顺便让机器运行。', 'Donald Knuth'],
  ['大道至简，复杂的系统往往来自简单的想法的堆积。', 'Richard Feynman'],
  ['行动胜于分析。', 'Jeff Bezos'],
  ['最好的代码就是没有代码。', 'Jeff Atwood'],
  ['简单是终极的复杂。', 'Leonardo da Vinci'],
];
var qi = quotes[Math.floor(Math.random() * quotes.length)];
document.getElementById('quote').textContent = '"' + qi[0] + '"';
document.getElementById('quoteAuthor').textContent = '— ' + qi[1];

// ── Particles ──
var shapes = ['💗','✨','🌸','💕','🎀','🐷'];
for (var i = 0; i < 14; i++) {
  var p = document.createElement('div');
  p.className = 'particle';
  p.textContent = shapes[Math.floor(Math.random() * shapes.length)];
  p.style.left = Math.random() * 100 + '%';
  p.style.fontSize = (12 + Math.random() * 14) + 'px';
  p.style.animationDuration = (12 + Math.random() * 14) + 's';
  p.style.animationDelay = Math.random() * 12 + 's';
  document.getElementById('particles').appendChild(p);
}

// ── Memo ──
var memos = [];
function loadMemos() { memos = JSON.parse(localStorage.getItem('dashMemos') || '[]'); renderMemos(); }
function renderMemos() {
  var list = document.getElementById('memoList');
  if (memos.length === 0) { list.innerHTML = '<div class="memo-empty">记录点什么吧~</div>'; return; }
  var html = '';
  for (var i = 0; i < memos.length; i++) {
    var m = memos[i];
    html += '<div class="memo-item"><div class="memo-check ' + (m.done?'done':'') + '" onclick="toggleMemo(' + i + ')">' + (m.done?'✓':'') + '</div><div class="memo-text ' + (m.done?'done':'') + '" onclick="toggleMemo(' + i + ')">' + m.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div></div>';
  }
  list.innerHTML = html;
}
function addMemo() {
  var text = document.getElementById('memoInput').value.trim();
  if (!text) return;
  memos.push({text: text, done: false});
  document.getElementById('memoInput').value = '';
  localStorage.setItem('dashMemos', JSON.stringify(memos));
  renderMemos();
}
function toggleMemo(i) { memos[i].done = !memos[i].done; localStorage.setItem('dashMemos', JSON.stringify(memos)); renderMemos(); }
loadMemos();
</script>
</body>
</html>
