<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* ── Minimalist Design System Tokens ── */
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --accent: #3b82f6;
  --accent-soft: rgba(59, 130, 246, 0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(59,130,246,0.12);
  --radius: 16px;
}

body {
  font-family: 'Outfit', 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

.content {
  max-width: 480px;
  margin: 0 auto;
  padding: 48px 24px 40px;
  height: 100vh;
  overflow-y: auto;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 40px;
}
.topbar-left {}
.greeting {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.name {
  font-size: 32px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}
.name span { color: var(--accent); }
.topbar-right {
  text-align: right;
  padding-top: 4px;
}
.weather-icon { font-size: 28px; line-height: 1; margin-bottom: 2px; }
.weather-temp { font-size: 20px; font-weight: 700; color: var(--text); }
.weather-loc { font-size: 11px; color: var(--muted); }

/* ── Clock ── */
.clock-section { margin-bottom: 40px; }
.clock-main {
  font-size: 80px;
  font-weight: 200;
  color: var(--text);
  line-height: 1;
  letter-spacing: -4px;
  font-variant-numeric: tabular-nums;
}
.clock-sec {
  font-size: 28px;
  font-weight: 200;
  color: var(--muted);
  vertical-align: super;
  letter-spacing: -1px;
  margin-left: 2px;
}
.clock-date {
  font-size: 14px;
  font-weight: 400;
  color: var(--muted);
  margin-top: 10px;
  letter-spacing: 0.5px;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin-bottom: 32px;
}

/* ── Info Row ── */
.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.info-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  transition: all 0.25s ease;
}
.info-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.info-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.info-value { font-size: 14px; font-weight: 600; color: var(--text); }
.info-icon { font-size: 18px; margin-bottom: 6px; }

/* ── Quote ── */
.quote-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
}
.quote-text {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  font-style: normal;
}
.quote-author {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
}

/* ── Memo ── */
.memo-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  margin-bottom: 24px;
}
.memo-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.memo-input-row {
  display: flex;
  gap: 8px;
}
.memo-input {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 9px 14px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.memo-input:focus { border-color: var(--accent); }
.memo-input::placeholder { color: var(--muted); }
.memo-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 12px;
  padding: 9px 14px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.memo-btn:hover { background: #2563eb; transform: translateY(-1px); }
.memo-list { margin-top: 10px; }
.memo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text);
}
.memo-item:last-child { border-bottom: none; }
.memo-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #fff;
  flex-shrink: 0;
  transition: all 0.2s;
}
.memo-check.done { background: var(--accent); border-color: var(--accent); }
.memo-text { flex: 1; cursor: pointer; line-height: 1.5; }
.memo-text.done { text-decoration: line-through; color: var(--muted); }
.memo-empty { text-align: center; font-size: 11px; color: var(--muted); padding: 8px 0; }

/* ── Particles ── */
.particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.particle {
  position: absolute;
  animation: floatUp linear infinite;
  opacity: 0;
  filter: drop-shadow(0 0 4px rgba(59,130,246,0.15));
}
@keyframes floatUp {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="content">

  <!-- Top bar: greeting left, weather right -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="greeting" id="greeting">下午好</div>
      <div class="name">程乐<span>正</span></div>
    </div>
    <div class="topbar-right">
      <div class="weather-icon" id="weatherIcon">🌤️</div>
      <div class="weather-temp" id="weatherTemp">--°</div>
      <div class="weather-loc" id="weatherLoc">江西</div>
    </div>
  </div>

  <!-- Clock -->
  <div class="clock-section">
    <div class="clock-main">
      <span id="clockTime">--:--</span><span class="clock-sec" id="clockSec">--</span>
    </div>
    <div class="clock-date" id="clockDate">----年--月--日 星期--</div>
  </div>

  <div class="divider"></div>

  <!-- Info row -->
  <div class="info-row">
    <div class="info-card">
      <div class="info-icon">📍</div>
      <div class="info-label">位置</div>
      <div class="info-value" id="ipInfo">--</div>
    </div>
    <div class="info-card">
      <div class="info-icon">🗓</div>
      <div class="info-label">日期</div>
      <div class="info-value" id="todayInfo">--</div>
    </div>
  </div>

  <!-- Quote -->
  <div class="quote-card">
    <div class="quote-text" id="quote">"loading..."</div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

  <!-- Logs link -->
  <div class="memo-card">
    <div class="memo-title">📊 每日日志</div>
    <div style="padding: 4px 0 2px;">
      <a href="logs.html" class="memo-btn" style="display:inline-block;text-decoration:none;color:#fff;background:var(--accent);padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;">查看运行日志 →</a>
    </div>
  </div>

  <!-- Memo -->
  <div class="memo-card">
    <div class="memo-title">备忘</div>
    <div class="memo-list" id="memoList"></div>
    <div class="memo-input-row">
      <input class="memo-input" id="memoInput" placeholder="写点什么..." onkeydown="if(event.key==='Enter')addMemo()">
      <button class="memo-btn" onclick="addMemo()">添加</button>
    </div>
  </div>

</div>

<script>
/* ── Clock ── */
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = h + ':' + m;
  document.getElementById('clockSec').textContent = s;
  var days = ['日','一','二','三','四','五','六'];
  document.getElementById('clockDate').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + days[now.getDay()];
}
setInterval(updateClock, 1000);
updateClock();

/* ── Greeting ── */
function updateGreeting() {
  var h = new Date().getHours();
  var t = h < 6 ? '凌晨好' : h < 9 ? '早上好' : h < 12 ? '上午好' : h < 14 ? '中午好' : h < 18 ? '下午好' : h < 22 ? '晚上好' : '夜深了';
  document.getElementById('greeting').textContent = t;
}
updateGreeting();

/* ── IP Location ── */
async function fetchIP() {
  try {
    var r = await fetch('https://ipinfo.io/json');
    var d = await r.json();
    document.getElementById('ipInfo').textContent = d.city ? (d.city + ', ' + d.country) : d.ip;
    document.getElementById('todayInfo').textContent = new Date().toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit'});
  } catch(e) {
    document.getElementById('ipInfo').textContent = '无法获取';
    document.getElementById('todayInfo').textContent = new Date().toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit'});
  }
}
fetchIP();

/* ── Weather (Jiangxi) ── */
async function fetchWeather() {
  try {
    var r = await fetch('https://wttr.in/Jiangxi?format=%c+%t+%C&lang=zh');
    var t = await r.text();
    var parts = t.trim().split(/\s+/);
    document.getElementById('weatherIcon').textContent = parts[0] || '☀️';
    document.getElementById('weatherTemp').textContent = (parts[1] || '+26').replace('C','') + '°';
    document.getElementById('weatherLoc').textContent = parts[2] || '江西';
  } catch(e) {
    document.getElementById('weatherTemp').textContent = '+26°';
  }
}
fetchWeather();

/* ── Quote ── */
var quotes = [
  ['代码是写给人读的，顺便让机器运行。', 'Donald Knuth'],
  ['大道至简，复杂的系统往往来自简单的想法的堆积。', 'Richard Feynman'],
  ['行动胜于分析。', 'Jeff Bezos'],
  ['最好的代码就是没有代码。', 'Jeff Atwood'],
  ['简单是终极的复杂。', 'Leonardo da Vinci'],
  ['保持简单，让复杂性自然产生。', 'John Maeda'],
];
var qi = quotes[Math.floor(Math.random() * quotes.length)];
document.getElementById('quote').textContent = '"' + qi[0] + '"';
document.getElementById('quoteAuthor').textContent = '— ' + qi[1];

/* ── Particles ── */
var shapes = ['✨','🧊','💠','🔵','🌊','🪐'];
for (var i = 0; i < 12; i++) {
  var p = document.createElement('div');
  p.className = 'particle';
  p.textContent = shapes[Math.floor(Math.random() * shapes.length)];
  p.style.left = Math.random() * 100 + '%';
  p.style.fontSize = (12 + Math.random() * 12) + 'px';
  p.style.animationDuration = (12 + Math.random() * 14) + 's';
  p.style.animationDelay = Math.random() * 12 + 's';
  document.getElementById('particles').appendChild(p);
}

/* ── Memo ── */
var memos = [];
function loadMemos() { memos = JSON.parse(localStorage.getItem('dashMemos2') || '[]'); renderMemos(); }
function renderMemos() {
  var list = document.getElementById('memoList');
  if (memos.length === 0) { list.innerHTML = '<div class="memo-empty">记录点什么吧~</div>'; return; }
  var html = '';
  for (var i = 0; i < memos.length; i++) {
    var m = memos[i];
    html += '<div class="memo-item"><div class="memo-check ' + (m.done?'done':'') + '" onclick="toggleMemo(' + i + ')">' + (m.done?'✓':'') + '</div><div class="memo-text ' + (m.done?'done':'') + '" onclick="toggleMemo(' + i + ')">' + m.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div></div>';
  }
  list.innerHTML = html;
}
function addMemo() {
  var text = document.getElementById('memoInput').value.trim();
  if (!text) return;
  memos.push({text: text, done: false});
  document.getElementById('memoInput').value = '';
  localStorage.setItem('dashMemos2', JSON.stringify(memos));
  renderMemos();
}
function toggleMemo(i) { memos[i].done = !memos[i].done; localStorage.setItem('dashMemos2', JSON.stringify(memos)); renderMemos(); }
loadMemos();
</script>
</body>
</html>
