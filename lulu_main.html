<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐹 水豚噜噜 SVG</title>
<style>
body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#faf8f3; gap:30px; font-family:sans-serif; padding:40px; }
.caption { color:#8B7355; font-size:0.9rem; text-align:center; }
</style>
</head>
<body>

<h2 style="color:#8B7355;">水豚噜噜 · 原创矢量 SVG</h2>

<!-- ══════════════════════════════════
     水豚噜噜 — 呆萌好奇款
     特征：圆橙色身体/头顶小橙球/大圆眼/小圆耳/棕色下装
══════════════════════════════════ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="280" height="298">
  <defs>
    <!-- 身体渐变 -->
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F5B87A"/>
      <stop offset="100%" stop-color="#E09050"/>
    </radialGradient>
    <!-- 头顶橙球渐变 -->
    <radialGradient id="fruitGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFD070"/>
      <stop offset="100%" stop-color="#F09030"/>
    </radialGradient>
    <!-- 腮红 -->
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8888" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8888" stop-opacity="0"/>
    </radialGradient>
    <!-- 衣服渐变 -->
    <linearGradient id="clothGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8834A"/>
      <stop offset="100%" stop-color="#A06830"/>
    </linearGradient>
  </defs>

  <!-- 身体 -->
  <ellipse cx="150" cy="215" rx="95" ry="80" fill="url(#bodyGrad)"/>

  <!-- 肚子高光 -->
  <ellipse cx="150" cy="225" rx="68" ry="58" fill="#F8C89A" opacity="0.5"/>

  <!-- 头部 -->
  <ellipse cx="150" cy="128" rx="82" ry="72" fill="url(#bodyGrad)"/>

  <!-- 头顶橙球（小柿子/橙球） -->
  <circle cx="150" cy="60" r="26" fill="url(#fruitGrad)"/>
  <!-- 橙球高光 -->
  <circle cx="142" cy="52" r="8" fill="white" opacity="0.35"/>
  <!-- 橙球小叶子 -->
  <path d="M150,36 Q158,28 165,35 Q158,38 150,36Z" fill="#7AC44A"/>
  <path d="M150,36 Q148,26 158,30" stroke="#5A9030" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 头顶耳朵左 -->
  <ellipse cx="88" cy="80" rx="22" ry="16" fill="#E09050"/>
  <ellipse cx="88" cy="80" rx="14" ry="10" fill="#F5C090"/>
  <!-- 头顶耳朵右 -->
  <ellipse cx="212" cy="80" rx="22" ry="16" fill="#E09050"/>
  <ellipse cx="212" cy="80" rx="14" ry="10" fill="#F5C090"/>

  <!-- 脸部浅色区域 -->
  <ellipse cx="150" cy="140" rx="60" ry="52" fill="#F5C090"/>

  <!-- 腮红左 -->
  <ellipse cx="92" cy="148" rx="26" ry="16" fill="url(#blush)"/>
  <!-- 腮红右 -->
  <ellipse cx="208" cy="148" rx="26" ry="16" fill="url(#blush)"/>

  <!-- 大圆眼左 -->
  <ellipse cx="118" cy="122" rx="20" ry="22" fill="#1A1A2E"/>
  <circle cx="122" cy="115" r="7" fill="white" opacity="0.85"/>
  <circle cx="114" cy="125" r="3" fill="white" opacity="0.4"/>
  <!-- 大圆眼右 -->
  <ellipse cx="182" cy="122" rx="20" ry="22" fill="#1A1A2E"/>
  <circle cx="186" cy="115" r="7" fill="white" opacity="0.85"/>
  <circle cx="178" cy="125" r="3" fill="white" opacity="0.4"/>

  <!-- 鼻子/嘴巴（简化为可爱短弧） -->
  <path d="M140,150 Q150,158 160,150" stroke="#5C3D2E" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- 嘴巴微张 -->
  <ellipse cx="150" cy="153" rx="8" ry="4" fill="#D4856A"/>

  <!-- 身体左右手臂 -->
  <!-- 左手 -->
  <ellipse cx="68" cy="218" rx="28" ry="22" fill="#E09050"/>
  <ellipse cx="68" cy="218" rx="20" ry="15" fill="#F5C090" opacity="0.4"/>
  <!-- 右手 -->
  <ellipse cx="232" cy="218" rx="28" ry="22" fill="#E09050"/>
  <ellipse cx="232" cy="218" rx="20" ry="15" fill="#F5C090" opacity="0.4"/>

  <!-- 棕色下装/衣服 -->
  <path d="M70,270 Q150,255 230,270 L225,310 Q150,305 75,310Z" fill="url(#clothGrad)"/>
  <!-- 衣服高光 -->
  <path d="M85,272 Q150,260 215,272 L212,275 Q150,264 88,275Z" fill="#D49560" opacity="0.4"/>

  <!-- 小尾巴 -->
  <ellipse cx="240" cy="230" rx="14" ry="11" fill="#C07838"/>

  <!-- 小脚 -->
  <ellipse cx="108" cy="305" rx="26" ry="13" fill="#B07838"/>
  <ellipse cx="192" cy="305" rx="26" ry="13" fill="#B07838"/>
</svg>

<p class="caption">水豚噜噜 · 呆萌好奇款</p>
<p class="caption" style="margin-top:4px;">原创 SVG 矢量 · 可无限缩放 · 特征：头顶橙球/大圆眼/棕色下装</p>

</body>
</html>
