<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运行日志 · 乐正</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --glass-bg: rgba(255, 255, 255, 0.55);
  --glass-border: rgba(255, 255, 255, 0.8);
  --glass-shadow: 0 8px 32px rgba(139, 92, 246, 0.08);
  --glass-shadow-hover: 0 16px 48px rgba(139, 92, 246, 0.15);
  --accent-blue: #60a5fa;
  --accent-pink: #f472b6;
  --text-primary: #1e1b4b;
  --text-muted: rgba(30, 27, 75, 0.5);
}

body {
  font-family: 'Outfit', 'Noto Sans SC', -apple-system, sans-serif;
  min-height: 100vh;
  user-select: none;
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 90% 70% at 10% 5%, rgba(147, 197, 253, 0.7) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 90% 95%, rgba(252, 165, 165, 0.5) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 85% 15%, rgba(192, 132, 252, 0.35) 0%, transparent 50%),
    radial-gradient(ellipse 60% 60% at 15% 85%, rgba(244, 114, 182, 0.25) 0%, transparent 50%),
    linear-gradient(160deg, #f0f4ff 0%, #fdf2f8 40%, #faf5ff 70%, #fff 100%);
}

.content {
  position: relative;
  z-index: 2;
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 28px 60px;
}

.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: var(--glass-shadow);
}

/* ── Header ── */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(139,92,246,0.1);
}
.back-btn {
  font-size: 12px;
  color: var(--accent-blue);
  text-decoration: none;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 8px;
}
.back-btn:hover { opacity: 0.7; }
.page-title {
  font-size: 26px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}
.page-title span {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-date {
  font-size: 12px;
  color: var(--text-muted);
  text-align: right;
  padding-top: 4px;
}

/* ── Summary ── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.summary-card {
  padding: 16px;
  text-align: center;
  transition: all 0.25s ease;
}
.summary-card:hover {
  background: rgba(255,255,255,0.72);
  box-shadow: var(--glass-shadow-hover);
  transform: translateY(-2px);
}
.summary-num {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.summary-label {
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

/* ── Date Filter ── */
.date-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.date-btn {
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 11px;
  font-family: inherit;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.date-btn.active, .date-btn:hover {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 14px rgba(96,165,250,0.3);
}

/* ── Log Entry ── */
.log-section { margin-bottom: 8px; }
.log-date-header {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 14px 0 10px;
  border-bottom: 1px solid rgba(139,92,246,0.08);
  margin-bottom: 10px;
}
.log-entry {
  padding: 14px 18px;
  margin-bottom: 10px;
  transition: all 0.2s;
  cursor: pointer;
}
.log-entry:hover {
  background: rgba(255,255,255,0.72);
  box-shadow: var(--glass-shadow-hover);
  transform: translateY(-1px);
}
.log-time {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent-blue);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.log-type {
  display: inline-block;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 12px;
  margin-right: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.log-type.done { background: rgba(34,197,94,0.12); color: #16a34a; }
.log-type.task { background: rgba(96,165,250,0.12); color: #2563eb; }
.log-type.note { background: rgba(192,132,252,0.12); color: #9333ea; }
.log-type.error { background: rgba(239,68,68,0.1); color: #dc2626; }
.log-content {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.65;
  margin-top: 4px;
}
.log-empty {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  padding: 44px 0;
}

/* ── Add Log ── */
.add-log-card {
  padding: 18px;
  margin-bottom: 24px;
}
.add-log-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.add-log-input {
  width: 100%;
  background: rgba(255,255,255,0.6);
  border: 1.5px solid rgba(139,92,246,0.15);
  border-radius: 14px;
  padding: 12px 16px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text-primary);
  outline: none;
  resize: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.add-log-input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(96,165,250,0.12);
}
.add-log-input::placeholder { color: var(--text-muted); }
.add-log-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
}
.type-select {
  background: rgba(255,255,255,0.6);
  border: 1.5px solid rgba(139,92,246,0.15);
  border-radius: 12px;
  padding: 9px 12px;
  font-size: 11px;
  font-family: inherit;
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
}
.type-select option { background: #f0f4ff; }
.add-btn {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
  border: none;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  margin-left: auto;
}
.add-btn:hover {
  opacity: 0.85;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(96,165,250,0.35);
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="content">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <a class="back-btn" href="index.html">← 返回主页</a>
      <div class="page-title">运行<span>日志</span></div>
    </div>
    <div class="header-right">
      <div class="header-date" id="today"></div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-row">
    <div class="summary-card glass">
      <div class="summary-num" id="totalCount">0</div>
      <div class="summary-label">总记录</div>
    </div>
    <div class="summary-card glass">
      <div class="summary-num" id="doneCount">0</div>
      <div class="summary-label">已完成</div>
    </div>
    <div class="summary-card glass">
      <div class="summary-num" id="todayCount">0</div>
      <div class="summary-label">今日</div>
    </div>
  </div>

  <!-- Add log -->
  <div class="add-log-card glass">
    <div class="add-log-title">添加记录</div>
    <textarea class="add-log-input" id="logInput" placeholder="记录今天的完成事项、想法、待办..." rows="3"></textarea>
    <div class="add-log-row">
      <select class="type-select" id="logType">
        <option value="done">✅ 完成</option>
        <option value="task">📋 任务</option>
        <option value="note">📝 笔记</option>
        <option value="error">❌ 问题</option>
      </select>
      <button class="add-btn" onclick="addLog()">添加</button>
    </div>
  </div>

  <!-- Logs list -->
  <div id="logsList"></div>

</div>

<script>
var LOG_KEY = 'dashLogs2';

function getLogs() {
  return JSON.parse(localStorage.getItem(LOG_KEY) || '[]');
}

function saveLogs(logs) {
  localStorage.setItem(LOG_KEY, JSON.stringify(logs));
}

function addLog() {
  var text = document.getElementById('logInput').value.trim();
  if (!text) return;
  var type = document.getElementById('logType').value;
  var now = new Date();
  var log = {
    id: Date.now(),
    type: type,
    text: text,
    time: now.toTimeString().substring(0,5),
    date: now.toLocaleDateString('zh-CN'),
    ts: now.getTime()
  };
  var logs = getLogs();
  logs.unshift(log);
  saveLogs(logs);
  document.getElementById('logInput').value = '';
  renderLogs();
  updateSummary();
}

function deleteLog(id) {
  var logs = getLogs().filter(function(l) { return l.id !== id; });
  saveLogs(logs);
  renderLogs();
  updateSummary();
}

function updateSummary() {
  var logs = getLogs();
  var today = new Date().toLocaleDateString('zh-CN');
  document.getElementById('totalCount').textContent = logs.length;
  document.getElementById('doneCount').textContent = logs.filter(function(l) { return l.type === 'done'; }).length;
  document.getElementById('todayCount').textContent = logs.filter(function(l) { return l.date === today; }).length;
}

function renderLogs() {
  var logs = getLogs();
  var today = new Date().toLocaleDateString('zh-CN');
  var yesterday = new Date(Date.now() - 86400000).toLocaleDateString('zh-CN');
  document.getElementById('today').textContent = today;

  if (logs.length === 0) {
    document.getElementById('logsList').innerHTML = '<div class="log-empty">还没有记录，从上面添加第一条吧~</div>';
    return;
  }

  var html = '';
  var currentDate = '';
  logs.forEach(function(log) {
    if (log.date !== currentDate) {
      currentDate = log.date;
      var label = currentDate === today ? '今天' : currentDate === yesterday ? '昨天' : currentDate;
      html += '<div class="log-date-header">' + label + ' · ' + currentDate + '</div>';
    }
    var typeLabel = {done:'完成',task:'任务',note:'笔记',error:'问题'}[log.type];
    html += '<div class="log-entry glass" onclick="if(confirm(\'删除这条记录?\')) deleteLog(' + log.id + ')">';
    html += '<div class="log-time">' + log.time + ' <span class="log-type ' + log.type + '">' + typeLabel + '</span></div>';
    html += '<div class="log-content">' + log.text.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
    html += '</div>';
  });
  document.getElementById('logsList').innerHTML = html;
}

// Init
document.getElementById('today').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});
renderLogs();
updateSummary();
</script>
</body>
</html>
